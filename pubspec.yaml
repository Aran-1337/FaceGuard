name: pig
description: "PIG - Attendance System with Face Recognition"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  
  # Firebase
  firebase_core: ^3.8.1
  firebase_auth: ^5.3.4
  cloud_firestore: ^5.6.0
  firebase_storage: ^12.3.7
  
  # State Management
  provider: ^6.1.2
  
  # Camera & Face Detection
  camera: ^0.11.0+2
  google_mlkit_face_detection: ^0.12.0
  
  # UI/UX
  flutter_svg: ^2.0.16
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  google_fonts: ^6.2.1
  fl_chart: ^1.1.1
  table_calendar: ^3.1.3
  
  # HTTP
  http: ^1.2.2

  # Utilities
  intl: ^0.20.1
  shared_preferences: ^2.3.3
  permission_handler: ^11.3.1
  geolocator: ^13.0.3
  image_picker: ^1.1.2
  path_provider: ^2.1.5
  uuid: ^4.5.1
  url_launcher: ^6.3.2
  flutter_map: ^8.3.0
  latlong2: ^0.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/icon.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/icon.png"
